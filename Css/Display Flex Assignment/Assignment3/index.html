<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <header>
        <nav>
          <div class="nav-brand">
            <img
              width="150px"
              src="https://digital-hunters-landing.vercel.app/assets/logo.png"
              alt=""
            />
          </div>
          <ul>
            <li><a href="#">Главная</a></li>
            <li><a href="#">О нас</a></li>
            <li><a href="#">Проекты</a></li>
            <li><a href="#">Услуги</a></li>
            <li><a href="#">Контакты</a></li>
          </ul>
          <div class="nav-btn">
            <button>
              Связаться с нами &nbsp;&nbsp;
              <i class="ri-arrow-right-up-fill"></i>
            </button>
          </div>
        </nav>
      </header>
      <section class="hero-section">
        <div class="left-part">
          <span class="span">МЫ СОЗДАЕМ</span>
          <h1><span class="digital">DIGITAL</span> <br /> <span class="hunter">HUNTERS</span></h1>
          <span class="subtitle">СТУДИЯ РАЗРАБОТКИ <br />MOBILE И XR ИГР</span>
          <p class="decs">
            Создаем уникальные мобильные <br>и XR игры с захватывающим геймплеем <br>и
            сильной визуальной подачей.
          </p>
          <div class="hero-btn">
            <button class="button">
              Связаться с нами &nbsp;&nbsp;
              <i class="ri-arrow-right-long-line"></i>
            </button>
            <div class="play-btn">
              <div>

                <span><i class="ri-play-fill"></i></span>
              </div>
              <span> Смотреть шоуreel</span></div>
          </div>
        </div>
        <div class="center-part">
          <img src="./hunter-Photoroom.png" alt="">
        </div>
        <div class="right-part">
            <img class="game-utility" src="./gameUtility.png" alt="">
        </div>
      </section>
      <section class="stats-wrapper">
        <img src="./" alt="">
        <div></div>
      </section>
    </main>
  </body>
</html>
